name: Build e Deploy (GitHub Pages)

# Compila o app Flutter Web e publica no GitHub Pages.
# Pré-requisito: em Settings > Pages, definir "Source" = "GitHub Actions".

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy concorrente.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar código
        run: flutter analyze
        continue-on-error: true

      - name: Build Web
        # base-href deve corresponder ao nome do repositório para o GitHub Pages.
        run: flutter build web --release --base-href "/italian-brazilian-flashcards/"

      - name: Upload artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
