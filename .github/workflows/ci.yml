name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # --no-fatal-infos: não falhar por lints de estilo (info), apenas por
      # erros e warnings reais.
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
