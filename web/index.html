<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flashcards de italiano e português brasileiro com módulos, cronômetro e pontuação.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Flashcards IT/PT">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="manifest" href="manifest.json">
  <title>Flashcards Italiano ⇄ Português</title>

  <style>
    body { margin: 0; background: #0f1226; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e7e9ff; gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,.18); border-top-color: #7c8cff;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Carregando flashcards…</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
